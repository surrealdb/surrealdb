name: 'Propagate binaries'
description: 'Propagate binaries to all AWS regions'

inputs:
  aws-access-key-id:
    description: 'AWS access key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS secret access key'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
      with:
        aws-region: us-east-2
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}

    - name: Distribute binaries
      shell: bash
      run: |
        regions=("af-south-1" "ap-east-1" "ap-south-1" "ap-southeast-1" "ap-southeast-2" "ca-central-1" "eu-central-1" "eu-west-2" "me-south-1" "sa-east-1" "us-west-2")
        failed_regions=()
        succeeded_regions=()
        for region in ${regions[@]}; do
            if aws s3 sync --cli-connect-timeout 30 --cli-read-timeout 120 --delete --storage-class INTELLIGENT_TIERING --source-region eu-west-2 --region ${region} s3://download.surrealdb.com s3://download.${region}.surrealdb.com; then
                succeeded_regions+=("${region}")
            else
                failed_regions+=("${region}")
            fi
        done
        total=${#regions[@]}
        quorum=$(( total / 2 + 1 ))
        if [ ${#failed_regions[@]} -gt 0 ]; then
            echo "::warning::Sync failed for regions: ${failed_regions[*]}"
        fi
        if [ ${#succeeded_regions[@]} -lt ${quorum} ]; then
            echo "::error::Only ${#succeeded_regions[@]}/${total} regions synced, quorum of ${quorum} not met"
            exit 1
        fi


