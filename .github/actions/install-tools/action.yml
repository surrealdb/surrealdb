name: 'Install tools'
description: 'Install tools'

inputs:
  preset:
    description: 'Preset tool collection to install (test, build). Takes precedence over tools if specified.'
    required: false
  tools:
    description: 'Tools to install (comma-separated). Used if preset is not specified.'
    required: false
    default: 'cargo-make'
  use-cargo-install:
    description: 'If true, install tools via cargo install instead of taiki-e/install-action. Use on self-hosted runners where sudo may not be available (avoids unzip/system deps).'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Determine tools to install
      id: resolve-tools
      shell: bash
      run: |
        if [[ -n "${{ inputs.preset }}" ]]; then
          case "${{ inputs.preset }}" in
            test)
              # Tools needed for workspace testing
              echo "tools=cargo-nextest,cargo-make" >> $GITHUB_OUTPUT
              ;;
            build)
              # Tools needed for basic builds
              echo "tools=cargo-make" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unknown preset: ${{ inputs.preset }}"
              exit 1
              ;;
          esac
        else
          echo "tools=${{ inputs.tools }}" >> $GITHUB_OUTPUT
        fi

    - name: Install tools (cargo install)
      if: inputs.use-cargo-install == 'true'
      shell: bash
      run: |
        for tool in ${TOOLS//,/ }; do
          cargo install "$tool" --locked
        done
      env:
        TOOLS: ${{ steps.resolve-tools.outputs.tools }}

    - name: Install tools
      if: inputs.use-cargo-install != 'true'
      uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # (Actions must be pinned by commit hash) v2.75.1
      with:
        tool: ${{ steps.resolve-tools.outputs.tools }}
